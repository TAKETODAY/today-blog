server:
  session:
    timeout: 3D
    persistent: true
  netty:
    worker-threads: 8
    acceptor-threads: 1
    max-connection: 10240000
  use-virtual-thread-service-executor: true

datasource:
  username: root
  password: 88888888
  url: jdbc:mysql://localhost:3306/today?useUnicode=true&characterEncoding=utf8&useSSL=false&autoReconnect=true&allowPublicKeyRetrieval=true&serverTimezone=UTC

  #jdbc.pool.isReadOnly    = false
  #jdbc.pool.idleTimeout   = 600000
  #jdbc.username           = ${jdbc.userName}
  #jdbc.driverClassName    = ${jdbc.driver}
  #jdbc.pool.connectionTimeout = 30000

site:
  #aliyun.oss.enable=false
  host: http://localhost:8080

aliyun:
  oss:
    enabled: false


web:
  error:
    include-message: always
  mvc:
    log-request-details: true

infra:
  task:
    execution:
      thread-name-prefix: app-pool-
      pool:
        max-size: 100

app:
  main:
    lazy-initialization: false

logging:
  level:
    netty: info
    nettyLogging: info
    web: debug
    sql: info
  pattern:
    dateformat: 'yyyy-MM-dd HH:mm:ss.SSS'